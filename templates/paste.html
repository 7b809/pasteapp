{% extends "base.html" %}

{% block title %}Take {{ key }}{% endblock %}

{% block body %}

<form method="post">
    <!-- Buttons always on top -->
<p><b>Share this link:</b> <a href="{{ request.url }}">{{ request.url }}</a></p>

    <div class="btn-group mb-3 sticky-top bg-light p-2" style="z-index: 10;">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-secondary" onclick="clearContent()">Clear</button>
        <button type="button" class="btn btn-success" onclick="copyContent()">Copy</button>
        <button type="button" class="btn btn-warning" onclick="pasteContent()">Paste</button>
    </div>

    <textarea id="contentArea" name="content" class="form-control bg-dark text-light" rows="20000" placeholder="Paste your content here..."></textarea>

</form>

<hr>
{% endblock %}
